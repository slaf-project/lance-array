site_name: lance-array
site_description: Chunk-aligned Zarr 3 and Lance blob v2 tile arrays
site_author: Pavan Ramkumar
site_url: https://slaf-project.github.io/lance-array/

repo_url: https://github.com/slaf-project/lance-array
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false

nav:
  - Home: index.md
  - API:
    - chunk_tiles: api/chunk_tiles.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
